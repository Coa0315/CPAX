<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Gradient: Deep Brand Blue and Rich Black -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0b1321" />
      <stop offset="60%" stop-color="#020408" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Glowing premium shadow for the central elements -->
    <filter id="premium-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Element Depth Shadow -->
    <filter id="element-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="-2" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.8" />
    </filter>

    <!-- CPAX Brand Blue (#274a78) Metallic Gradient -->
    <linearGradient id="c-brand-blue" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b8ecc" />
      <stop offset="35%" stop-color="#274a78" />
      <stop offset="70%" stop-color="#0f223d" />
      <stop offset="100%" stop-color="#040a12" />
    </linearGradient>

    <!-- Highlight Gradient for Inner Crescent bevel -->
    <linearGradient id="c-inner-highlight" x1="140" y1="140" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9abcfa" />
      <stop offset="50%" stop-color="#274a78" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Silver Core Axis Rod (The thread of study) -->
    <linearGradient id="axis-silver" x1="256" y1="90" x2="256" y2="422" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="30%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#94a3b8" />
      <stop offset="70%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0.9" />
    </linearGradient>

    <!-- Edge Highlight Reflection for Luxury Glassmorphism -->
    <linearGradient id="border-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#274a78" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#101827" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#274a78" stop-opacity="0.6" />
    </linearGradient>
  </defs>

  <!-- Solid premium black canvas with a subtle #274a78 glow border -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="108" />
  <rect x="3" y="3" width="506" height="506" rx="105" fill="none" stroke="url(#border-grad)" stroke-width="4.5" />

  <!-- Behind Ambient Glow of Blue -->
  <circle cx="210" cy="256" r="110" fill="#274a78" opacity="0.32" filter="url(#premium-glow)" />

  <!-- Axis Backbone Line (The Injection Core) -->
  <rect
    x="248"
    y="80"
    width="16"
    height="352"
    rx="8"
    fill="url(#axis-silver)"
    filter="url(#element-shadow)"
  />

  <!-- "C" Crescent Shape Body (Design Axis, Thick on Left, Shaded gracefully on ends) -->
  <path
    d="M 364,136 
       C 292,136 142,168 142,256 
       C 142,344 292,376 364,376 
       L 342,336 
       C 292,336 190,312 190,256 
       C 190,200 292,176 342,176 
       Z"
    fill="url(#c-brand-blue)"
    filter="url(#element-shadow)"
  />

  <!-- Secondary Inner Fine Crease for Multi-Material look -->
  <path
    d="M 346,156 
       C 290,156 168,186 168,256 
       C 168,326 290,356 346,356 
       L 336,336 
       C 286,336 200,312 200,256 
       C 200,200 286,176 336,176 
       Z"
    fill="url(#c-inner-highlight)"
    opacity="0.8"
  />

  <!-- Center Dynamic Target Sparkle (Intersection of Success) -->
  <circle cx="256" cy="256" r="8" fill="#ffffff" filter="url(#premium-glow)" />
  <polygon points="256,242 260,252 270,256 260,260 256,270 252,260 242,256 252,252" fill="#ffffff" />

  <!-- Vector CPAX Brand Typography (Re-styled for high-contrast slate look) -->
  <g fill="#f8fafc" id="cpax-text-group">
    <!-- C -->
    <path d="M 171,425 C 163,417 152,415 143,415 C 126.4,415 113,428.4 113,445 C 113,461.6 126.4,475 143,475 C 152,475 163,473 171,465 L 163,455 C 157,461 151,463 143,463 C 133,463 125,455 125,445 C 125,435 133,427 143,427 C 151,427 157,429 163,435 Z" />
    
    <!-- P -->
    <path d="M 193,415 H 231 C 241,415 247,421 247,432 C 247,443 241,449 231,449 H 205 V 475 H 193 Z M 205,427 V 437 H 229 C 233,437 235,435 235,432 C 235,429 233,427 229,427 Z" />
    
    <!-- A -->
    <path d="M 287,415 L 263,475 H 276 L 282,460 H 304 L 310,475 H 323 L 299,415 Z M 286,449 L 293,430 L 300,449 Z" />
    
    <!-- X -->
    <path d="M 343,415 H 357 L 371,441 L 384,415 H 398 L 378,445 L 398,475 H 384 L 371,449 L 357,475 H 343 L 363,445 Z" />
  </g>
</svg>
