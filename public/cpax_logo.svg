<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Gradient: Deep Brand Blue with Pure Black atmosphere -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0b1321" />
      <stop offset="60%" stop-color="#020408" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Deep luxurious radial glow on ambient canvas behind C -->
    <radialGradient id="c-ambient-glow" cx="210" cy="256" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#274a78" stop-opacity="0.55" />
      <stop offset="50%" stop-color="#0f1f33" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- 3D Soft Drop Shadow for the "C" Crest -->
    <filter id="c-premium-shadow" x="-25%" y="-20%" width="150%" height="145%">
      <feDropShadow dx="-4" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.95" />
    </filter>

    <!-- Brand Blue Metallic Linear Gradient for the Main "C" Body -->
    <linearGradient id="c-main-grad" x1="120" y1="120" x2="390" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f7cb5" />
      <stop offset="35%" stop-color="#274a78" />
      <stop offset="70%" stop-color="#0f213b" />
      <stop offset="100%" stop-color="#030811" />
    </linearGradient>

    <!-- Shimmering highlight overlay mapping -->
    <linearGradient id="c-bevel-light" x1="150" y1="130" x2="330" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8dbf5" stop-opacity="0.75" />
      <stop offset="40%" stop-color="#274a78" stop-opacity="0.8" />
      <stop offset="85%" stop-color="#000000" stop-opacity="0.95" />
    </linearGradient>

    <!-- Fine inner outline for depth -->
    <linearGradient id="c-stroke-grad" x1="140" y1="150" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="40%" stop-color="#274a78" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.9" />
    </linearGradient>

    <!-- Edge Highlight Reflection for App Frame -->
    <linearGradient id="border-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#274a78" stop-opacity="0.85" />
      <stop offset="50%" stop-color="#101827" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#274a78" stop-opacity="0.5" />
    </linearGradient>
  </defs>

  <!-- Solid premium black canvas with a subtle #274a78 glow border -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="112" />
  <rect x="3" y="3" width="506" height="506" rx="109" fill="none" stroke="url(#border-grad)" stroke-width="4.5" />

  <!-- Ambient glowing atmosphere behind the C -->
  <circle cx="210" cy="256" r="220" fill="url(#c-ambient-glow)" />

  <!-- Backdrop shadow ring for depth -->
  <path
    d="M 362,150 A 150,150 0 1, 0 362,362 A 30,30 0 0, 0 320,320 A 90,90 0 1, 1 320,192 A 30,30 0 0, 0 362,150 Z"
    fill="#000000"
    opacity="0.6"
    transform="translate(-2, 5)"
  />

  <!-- Main "C" Body Crest Shape -->
  <path
    d="M 362,150 A 150,150 0 1, 0 362,362 A 30,30 0 0, 0 320,320 A 90,90 0 1, 1 320,192 A 30,30 0 0, 0 362,150 Z"
    fill="url(#c-main-grad)"
    filter="url(#c-premium-shadow)"
  />

  <!-- Bevel reflection overlay for ultra premium luxury metallic gloss -->
  <path
    d="M 346,166 A 130,130 0 1, 0 346,346 A 16,16 0 0, 0 324,324 A 90,90 0 1, 1 324,188 A 16,16 0 0, 0 346,166 Z"
    fill="url(#c-bevel-light)"
    opacity="0.85"
  />

  <!-- Delicate outer edge stroke highlight for crisp look -->
  <path
    d="M 362,150 A 150,150 0 1, 0 362,362 A 30,30 0 0, 0 320,320 A 90,90 0 1, 1 320,192 A 30,30 0 0, 0 362,150 Z"
    stroke="url(#c-stroke-grad)"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- Pure aesthetic target center dot representing Focus and Axis path -->
  <circle cx="210" cy="256" r="6" fill="#f8fafc" opacity="0.9" />
</svg>
